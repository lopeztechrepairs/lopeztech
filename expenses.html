<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#1b3a5c;--blue2:#2563a8;--green:#2f9e44;--red:#c92a2a;--amber:#e67700;
  --bg:#f8f9fa;--bg2:#fff;--border:#dee2e6;--text:#212529;--text2:#495057;--text3:#868e96;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}
.header{background:var(--blue);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.btn-history{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:7px 12px;border-radius:20px;font-size:12px;cursor:pointer;}
.form{padding:16px;}
.section{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:12px 16px 0;}
.field{padding:10px 16px 14px;}
.field label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:var(--text);background:#fff;outline:none;font-family:inherit;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(37,99,168,0.1);}
.field textarea{resize:none;height:72px;}




.scan-area{padding:10px 16px 14px;}
.scan-box{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:24px 16px;text-align:center;cursor:pointer;}
.scan-icon{width:40px;height:40px;margin:0 auto 10px;color:var(--text3);}
.scan-btns{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.scan-btn{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;border:none;cursor:pointer;}
.scan-btn.primary{background:var(--blue);color:#fff;}
.scan-btn.secondary{background:#fff;border:1px solid var(--border);color:var(--text);}
.preview-area{margin-top:10px;display:none;}
.preview-area.show{display:block;}
.preview-thumb{width:100%;border-radius:var(--radius-sm);border:1px solid var(--border);max-height:200px;object-fit:cover;}
.file-info{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-top:8px;}
.remove-btn{background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;line-height:1;margin-left:auto;}
.submit-btn{width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;margin-top:4px;}
.submit-btn:active{opacity:.85;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#212529;color:#fff;padding:12px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}
.loader{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:998;}
.loader.show{display:flex;}
.loader-box{background:#fff;border-radius:var(--radius);padding:28px 36px;text-align:center;}
.loader-spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-msg{font-size:14px;color:var(--text2);}
.history-view{display:none;padding:16px;}
.history-view.show{display:block;}
.hist-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hist-name{font-size:14px;font-weight:600;}
.hist-amt{font-size:15px;font-weight:700;color:var(--blue);}
.hist-meta{font-size:12px;color:var(--text3);margin-top:3px;}
.hist-cat{display:inline-block;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:11px;color:var(--text2);margin-top:5px;}
.currency-input{position:relative;}
.currency-input span{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text2);pointer-events:none;font-weight:600;}
.currency-input input{padding-left:30px !important;}
</style>

<body>

<div class="header">
  <div>
    <div style="font-size:18px;font-weight:600;color:#fff;">LT Expenses</div>
    <div style="font-size:11px;opacity:.7;color:#fff;margin-top:2px;">Lopez Tech Repairs</div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn-history" onclick="toggleSettings()" title="Settings">⚙️</button>
    <button class="btn-history" onclick="toggleHistory()">History</button>

</div>

<div id="form-view">
  <div class="form">
    <div id="setup-banner" style="background:#fff3bf;border:1px solid #e67700;border-radius:12px;padding:14px 16px;margin-bottom:12px;display:none;">
      <div style="font-size:13px;font-weight:700;color:#b35900;margin-bottom:6px;">⚙️ First Time Setup</div>
      <div style="font-size:12px;color:#664d03;margin-bottom:10px;">Paste your Expense Logger URL to enable Google Sheet logging:</div>
      <input id="setup-url" type="text" placeholder="Paste URL here..." style="width:100%;padding:10px 12px;border:1px solid #e67700;border-radius:8px;font-size:12px;font-family:monospace;margin-bottom:8px;"/>
      <button onclick="saveSetupUrl()" style="width:100%;padding:11px;background:#1b3a5c;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">Save & Connect</button>

    <div class="section">

        <select id="category-select" onchange="selectedCat=this.value">
          <option value="Parts & Supplies">Parts &amp; Supplies</option>
          <option value="Device Purchase">Device Purchase</option>
          <option value="Fuel">Fuel</option>
          <option value="Labor">Labor</option>
          <option value="Rent">Rent</option>
          <option value="Utilities">Utilities</option>
          <option value="Tools & Equipment">Tools &amp; Equipment</option>
          <option value="Shipping & Postage">Shipping &amp; Postage</option>
          <option value="Marketing & Advertising">Marketing &amp; Advertising</option>
          <option value="Software & Subscriptions">Software &amp; Subscriptions</option>
          <option value="Office Supplies">Office Supplies</option>
          <option value="Meals & Entertainment">Meals &amp; Entertainment</option>
          <option value="Vehicle Maintenance">Vehicle Maintenance</option>
          <option value="Insurance">Insurance</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Details</div>
      <div class="field">
        <label>Amount</label>
        <div class="currency-input">
          <span style="font-size:18px;">$</span>
          <input id="amount" type="number" step="0.01" min="0" placeholder="0.00" inputmode="decimal" style="font-size:22px;font-weight:600;padding:13px 14px 13px 30px;"/>

      <div class="field" style="padding-top:0;">
        <label>Location</label>
        <select id="location" style="font-size:17px;padding:12px 14px;">
          <option value="Dayton">Dayton</option>
          <option value="Crosby">Crosby</option>

      </div>
      <div class="field" style="padding-top:0;">
        <label>Date</label>
        <input id="exp-date" type="date" style="font-size:13px;padding:9px 12px;"/>
      </div>
      <div class="field" style="padding-top:0;">
        <label>Notes (optional)</label>
        <textarea id="notes" placeholder="e.g. 5x iPhone 14 Basic screens, order #12345..."></textarea>
      </div>
      <div class="field" style="padding-top:0;">
        <label>Submitted by</label>
        <input id="submitter" type="text" placeholder="Your name"/>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Receipt / Invoice</div>
      <div class="scan-area">
        <div class="scan-box" id="scan-box">
          <svg class="scan-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <p style="font-size:14px;color:var(--text3);margin-bottom:4px;">Scan or upload receipt</p>
          <p style="font-size:11px;color:#adb5bd;">Saved as compressed PDF</p>
          <div class="scan-btns">
            <button class="scan-btn primary" onclick="openCamera()">📷 Scan Receipt</button>
            <button class="scan-btn secondary" onclick="openFile()">Upload PDF/Photo</button>
          </div>
        </div>
        <div class="preview-area" id="preview-area">
          <img id="preview-img" class="preview-thumb" src="" alt="Receipt" style="display:none;"/>
          <div class="file-info">
            <svg width="20" height="20" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
            <div>
              <div id="file-name" style="font-size:12px;font-weight:600;color:var(--text);"></div>
              <div id="file-size" style="font-size:11px;color:var(--text3);"></div>
            </div>
            <button class="remove-btn" onclick="removeFile()">✕</button>
          </div>
        </div>
        <input type="file" id="file-input" accept="image/*,application/pdf" style="display:none;" onchange="handleFile(this)"/>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;" onchange="handleScan(this)"/>
      </div>
    </div>

    <button class="submit-btn" onclick="submitExpense()">Submit Expense</button>
  </div>
</div>

<div class="history-view" id="history-view">
  <div id="history-list"></div>
</div>

<div class="loader" id="loader">
  <div class="loader-box">
    <div class="loader-spin"></div>
    <div class="loader-msg" id="loader-msg">Saving...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const STORAGE_KEY='lt_expenses_v1';
let selectedCat='Parts & Supplies';
let capturedBlob=null;
let capturedFileName=null;

// Init
document.getElementById('exp-date').value=new Date().toISOString().split('T')[0];

// Show setup banner if URL not set
if(!localStorage.getItem('lt_exp_url')){
  document.getElementById('setup-banner').style.display='block';
}

function saveSetupUrl(){
  const url=document.getElementById('setup-url').value.trim();
  if(!url){alert('Please paste the URL first');return;}
  localStorage.setItem('lt_exp_url',url);
  document.getElementById('setup-banner').style.display='none';
  alert('Connected! You can now submit expenses.');
}
const savedName=localStorage.getItem('lt_exp_name');
if(savedName)document.getElementById('submitter').value=savedName;
document.getElementById('submitter').addEventListener('change',function(){localStorage.setItem('lt_exp_name',this.value);});

// Format amount on blur
document.getElementById('amount').addEventListener('blur',function(){
  if(this.value)this.value=parseFloat(this.value).toFixed(2);
});

// Supplier
function handleSupplierChange(sel){
  const other=document.getElementById('other-vendor-field');
  other.style.display=sel.value==='Other'?'block':'none';
}

function getVendor(){
  const sel=document.getElementById('supplier-select').value;
  if(sel==='Other')return document.getElementById('other-vendor').value.trim();
  return sel;
}

// Category handled by dropdown onchange

// Camera
function openCamera(){document.getElementById('camera-input').click();}
function openFile(){document.getElementById('file-input').click();}

async function handleScan(input){
  if(!input.files[0])return;
  showLoader('Processing receipt...');
  try{
    const pdf=await imageToPDF(input.files[0]);
    capturedBlob=pdf;
    capturedFileName='receipt_'+Date.now()+'.pdf';
    showFilePreview(input.files[0],capturedFileName,pdf.size);
  }catch(e){
    // fallback to compressed image
    const compressed=await compressImage(input.files[0]);
    capturedBlob=compressed;
    capturedFileName='receipt_'+Date.now()+'.jpg';
    showImagePreview(compressed,capturedFileName);
  }
  hideLoader();
}

async function handleFile(input){
  if(!input.files[0])return;
  const file=input.files[0];
  if(file.type==='application/pdf'){
    capturedBlob=file;capturedFileName=file.name;
    showFilePreview(null,file.name,file.size);
  } else {
    showLoader('Converting to PDF...');
    try{
      const pdf=await imageToPDF(file);
      capturedBlob=pdf;capturedFileName=file.name.replace(/\.[^.]+$/,'')+'.pdf';
      showFilePreview(file,capturedFileName,pdf.size);
    }catch(e){
      const compressed=await compressImage(file);
      capturedBlob=compressed;capturedFileName=file.name.replace(/\.[^.]+$/,'')+'.jpg';
      showImagePreview(compressed,capturedFileName);
    }
    hideLoader();
  }
}

async function imageToPDF(file){
  return new Promise(async(resolve,reject)=>{
    try{
      const compressed=await compressImage(file);
      const reader=new FileReader();
      reader.onload=function(e){
        try{
          const img=new Image();
          img.onload=function(){
            const {jsPDF}=window.jspdf;
            const pdf=new jsPDF({orientation:img.width>img.height?'l':'p',unit:'mm',format:'a4'});
            const pageW=pdf.internal.pageSize.getWidth();
            const pageH=pdf.internal.pageSize.getHeight();
            const ratio=Math.min(pageW/img.width,pageH/img.height);
            const w=img.width*ratio;
            const h=img.height*ratio;
            const x=(pageW-w)/2;
            const y=(pageH-h)/2;
            pdf.addImage(e.target.result,'JPEG',x,y,w,h);
            const blob=pdf.output('blob');
            resolve(blob);
          };
          img.src=e.target.result;
        }catch(err){reject(err);}
      };
      reader.readAsDataURL(compressed);
    }catch(err){reject(err);}
  });
}

async function compressImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=1400;
      let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>{URL.revokeObjectURL(url);resolve(blob);},'image/jpeg',0.75);
    };
    img.onerror=reject;
    img.src=url;
  });
}

function showImagePreview(blob,name){
  const url=URL.createObjectURL(blob);
  const img=document.getElementById('preview-img');
  img.src=url;img.style.display='block';
  showFileInfo(name,blob.size);
}

function showFilePreview(imgFile,name,size){
  if(imgFile&&imgFile.type.startsWith('image/')){
    const url=URL.createObjectURL(imgFile);
    const img=document.getElementById('preview-img');
    img.src=url;img.style.display='block';
  } else {
    document.getElementById('preview-img').style.display='none';
  }
  showFileInfo(name,size);
}

function showFileInfo(name,size){
  document.getElementById('file-name').textContent=name;
  document.getElementById('file-size').textContent=formatSize(size)+' — PDF ready';
  document.getElementById('preview-area').classList.add('show');
  document.getElementById('scan-box').style.display='none';
}

function removeFile(){
  capturedBlob=null;capturedFileName=null;
  document.getElementById('preview-area').classList.remove('show');
  document.getElementById('scan-box').style.display='block';
  document.getElementById('preview-img').src='';
  document.getElementById('file-input').value='';
  document.getElementById('camera-input').value='';
}

function formatSize(bytes){
  if(!bytes)return '';
  if(bytes<1024)return bytes+'B';
  if(bytes<1024*1024)return Math.round(bytes/1024)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}

// Submit
async function submitExpense(){
  const vendor=getVendor();
  const amount=parseFloat(document.getElementById('amount').value)||0;
  const location=document.getElementById('location').value;
  const date=document.getElementById('exp-date').value;
  const notes=document.getElementById('notes').value.trim();
  const submitter=document.getElementById('submitter').value.trim()||'Saul';

  if(!vendor){toast('Please select a supplier');return;}
  if(!amount){toast('Please enter an amount');return;}

  const formattedAmount=amount.toFixed(2);
  const dateObj=new Date(date+'T12:00:00');
  const month=dateObj.toLocaleDateString('en-US',{month:'long'});
  const year=dateObj.getFullYear();

  const expense={
    id:'exp_'+Date.now(),
    vendor,amount:formattedAmount,location,date,notes,submitter,
    category:selectedCat,
    month,year,
    createdAt:new Date().toISOString(),
    hasReceipt:!!capturedBlob,
    fileName:capturedFileName||null,
    folderPath:`Lopez Tech Expenses/${year}/${month}/${selectedCat}`
  };

  showLoader('Saving expense...');

  // Save locally
  const existing=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');

  // Store receipt as base64 if present
  if(capturedBlob){
    updateLoaderMsg('Saving receipt PDF...');
    await new Promise(resolve=>{
      const reader=new FileReader();
      reader.onload=function(e){
        expense.receiptData=e.target.result;
        expense.receiptSize=formatSize(capturedBlob.size);
        resolve();
      };
      reader.readAsDataURL(capturedBlob);
    });
  }

  existing.unshift(expense);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(existing));

  // Upload receipt to Google Drive then log to sheet
  const expUrl=localStorage.getItem('lt_exp_url');
  if(expUrl){
    try{
      let driveUrl='';
      // If receipt exists, upload to Drive first via POST
      if(capturedBlob&&expense.receiptData){
        try{
          updateLoaderMsg('Uploading to Google Drive...');
          const uploadRes=await fetch(expUrl,{
            method:'POST',
            mode:'no-cors',
            headers:{'Content-Type':'text/plain'},
            body:JSON.stringify({
              action:'uploadReceipt',
              fileData:expense.receiptData,
              fileName:capturedFileName||'receipt.pdf',
              mimeType:capturedBlob.type||'image/jpeg',
              year:expense.year,
              month:expense.month,
              location:expense.location,
              category:selectedCat,
              supplier:vendor,
              amount:formattedAmount
            })
          });
        }catch(e){console.warn('Drive upload failed',e);}
      }
      // Log to sheet
      updateLoaderMsg('Logging to Google Sheet...');
      const params=new URLSearchParams({
        action:'logExpense',
        date:dateObj.toLocaleDateString('en-US'),
        supplier:vendor,vendor,
        category:selectedCat,
        amount:formattedAmount,
        location,submitter,notes,
        hasReceipt:capturedBlob?'Yes':'No',
        _t:Date.now()
      });
      fetch(expUrl+'?'+params.toString(),{method:'GET',mode:'no-cors',cache:'no-store'});
    }catch(e){console.warn('Logging failed',e);}
  }

  hideLoader();
  toast(`✓ $${formattedAmount} saved — ${selectedCat}`);
  resetForm();
}

function resetForm(){
  document.getElementById('supplier-select').value='';
  document.getElementById('other-vendor').value='';
  document.getElementById('other-vendor-field').style.display='none';
  document.getElementById('amount').value='';
  document.getElementById('notes').value='';
  document.getElementById('exp-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('category-select').value='Parts & Supplies';
  selectedCat='Parts & Supplies';
  removeFile();
}

// History
function toggleSettings(){
  const banner=document.getElementById('setup-banner');
  if(!banner)return;
  const showing=banner.style.display==='block';
  banner.style.display=showing?'none':'block';
  if(!showing){
    const saved=localStorage.getItem('lt_exp_url')||'';
    document.getElementById('setup-url').value=saved;
    window.scrollTo(0,0);
  }
}

function toggleHistory(){
  const hv=document.getElementById('history-view');
  const fv=document.getElementById('form-view');
  const btn=document.querySelector('.btn-history');
  const showing=hv.classList.contains('show');
  if(showing){hv.classList.remove('show');fv.style.display='block';btn.textContent='History';}
  else{hv.classList.add('show');fv.style.display='none';btn.textContent='← Back';renderHistory();}
}

function renderHistory(){
  const expenses=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  const el=document.getElementById('history-list');
  if(!expenses.length){
    el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3);font-size:14px;">No expenses logged yet.</div>';
    return;
  }
  const groups={};
  expenses.forEach(e=>{
    const key=(e.month||'—')+' '+(e.year||'');
    if(!groups[key])groups[key]=[];
    groups[key].push(e);
  });
  let html='';
  Object.entries(groups).forEach(([month,items])=>{
    const total=items.reduce((s,e)=>s+parseFloat(e.amount||0),0);
    html+=`<div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:8px 0 6px;">${month} — $${total.toFixed(2)}</div>`;
    items.forEach(e=>{
      html+=`<div class="hist-item">
        <div class="hist-top">
          <div class="hist-name">${e.vendor}</div>
          <div class="hist-amt">$${parseFloat(e.amount).toFixed(2)}</div>
        </div>
        <div class="hist-meta">${new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ${e.location} · ${e.submitter}</div>
        ${e.notes?`<div style="font-size:12px;color:var(--text2);margin-top:4px;">${e.notes}</div>`:''}
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          <div class="hist-cat">${e.category}</div>
          ${e.hasReceipt?`<div class="hist-cat" style="color:var(--green);border-color:var(--green);">📎 PDF receipt</div>`:''}
        </div>
        ${e.hasReceipt&&e.receiptData?`<button onclick="downloadReceipt('${e.id}')" style="margin-top:8px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;font-size:12px;cursor:pointer;width:100%;color:var(--blue2);">⬇ Download Receipt</button>`:''}
      </div>`;
    });
  });
  el.innerHTML=html;
}

function downloadReceipt(id){
  const expenses=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  const e=expenses.find(x=>x.id===id);
  if(!e||!e.receiptData)return;
  const a=document.createElement('a');
  a.href=e.receiptData;
  a.download=e.fileName||'receipt.pdf';
  a.click();
}

// Utils
function showLoader(msg){document.getElementById('loader-msg').textContent=msg||'Loading...';document.getElementById('loader').classList.add('show');}
function updateLoaderMsg(msg){document.getElementById('loader-msg').textContent=msg;}
function hideLoader(){document.getElementById('loader').classList.remove('show');}
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3500);
}
</script>
</body>
</html>

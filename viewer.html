<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>LTR · Repairs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --surface2:#1c2129; --surface3:#21262d;
  --border:#30363d; --border2:#3d444d;
  --text:#e6edf3; --text2:#8b949e; --text3:#484f58;
  --intake:#6e7681; --inprog:#f85149; --spec:#a371f7;
  --awaiting:#e3b341; --ready:#3fb950; --pastdue:#f85149;
  --crosby:#1f6feb; --dayton:#238636;
  --pill-r:20px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;overflow:hidden;}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:999;}
.login-badge{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#1f6feb,#0d419d);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;letter-spacing:-.5px;color:#fff;margin-bottom:20px;box-shadow:0 8px 32px rgba(31,111,235,.4);}
.login-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px;}
.pin-dots{display:flex;gap:12px;margin-bottom:32px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .2s;}
.pin-dot.filled{background:#1f6feb;border-color:#1f6feb;transform:scale(1.1);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px;}
.num-btn{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:18px;font-size:22px;font-weight:500;color:var(--text);cursor:pointer;transition:all .1s;font-family:'DM Sans',sans-serif;-webkit-user-select:none;}
.num-btn:active{background:var(--surface3);transform:scale(.95);}
.num-btn.del{font-size:18px;color:var(--text2);}
.num-btn.empty{visibility:hidden;}
#login-err{margin-top:16px;font-size:12px;color:var(--inprog);display:none;}

/* ── APP ── */
#app{display:none;height:100%;flex-direction:column;}
#app.on{display:flex;}

/* ── TOPBAR ── */
.topbar{
  padding:calc(var(--safe-top) + 14px) 16px 14px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.tb-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1f6feb,#0d419d);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;letter-spacing:-.3px;flex-shrink:0;}
.tb-title{font-size:16px;font-weight:700;letter-spacing:-.4px;flex:1;}
.tb-sub{font-size:10px;color:var(--text2);}
.tb-refresh{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;}
.tb-refresh:active{opacity:.7;}
#refresh-spin{display:inline-block;transition:transform .4s;}
#refresh-spin.spinning{animation:spin .5s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── FILTER BAR ── */
.filter-bar{
  padding:10px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;gap:8px;flex-shrink:0;
  overflow-x:auto;scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none;}
.f-chip{
  padding:6px 14px;border-radius:var(--pill-r);border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);font-size:12px;font-weight:500;
  white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0;
  font-family:'DM Sans',sans-serif;
}
.f-chip.active{border-color:currentColor;font-weight:600;}
.f-chip[data-loc="both"].active{background:rgba(31,111,235,.15);color:#58a6ff;border-color:#1f6feb;}
.f-chip[data-loc="Dayton"].active{background:rgba(35,134,54,.15);color:#3fb950;border-color:#238636;}
.f-chip[data-loc="Crosby"].active{background:rgba(31,111,235,.15);color:#79c0ff;border-color:#1f6feb;}
.f-sep{width:1px;background:var(--border);flex-shrink:0;margin:2px 0;}

/* ── SEARCH ── */
.search-wrap{padding:10px 16px;flex-shrink:0;background:var(--surface);}
.search-inp{width:100%;padding:9px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.search-inp::placeholder{color:var(--text3);}
.search-inp:focus{border-color:var(--border2);}

/* ── SCROLL AREA ── */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px calc(var(--safe-bot) + 12px);}
.scroll-area::-webkit-scrollbar{display:none;}

/* ── STATUS SECTION ── */
.status-group{margin-bottom:20px;}
.status-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 2px;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-name{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text2);}
.status-cnt{margin-left:auto;font-size:11px;font-weight:600;color:var(--text3);font-family:'DM Mono',monospace;}

/* ── REPAIR CARD ── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px 15px;margin-bottom:8px;
  cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.card:active{transform:scale(.98);background:var(--surface2);}
.card-top{display:flex;align-items:flex-start;gap:10px;}
.card-body{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:600;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.card-customer{font-size:12px;color:var(--text2);margin-bottom:6px;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap;}
.tag-loc-D{background:rgba(35,134,54,.15);color:#3fb950;}
.tag-loc-C{background:rgba(31,111,235,.15);color:#79c0ff;}
.tag-tech{background:var(--surface3);color:var(--text2);}
.tag-id{background:transparent;color:var(--text3);font-family:'DM Mono',monospace;font-size:9px;padding:2px 4px;}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.card-quote{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;}
.card-date{font-size:10px;color:var(--text3);}

/* card left-border colors */
.card[data-status="Intake & Acceptance"]::before{background:var(--intake);}
.card[data-status="In Progress"]::before{background:var(--inprog);}
.card[data-status="Dispatched to Specialist"]::before{background:var(--spec);}
.card[data-status="Awaiting Parts"]::before{background:var(--awaiting);}
.card[data-status="Ready for Pickup"]::before{background:var(--ready);}
.card[data-status="Past Due"]::before{background:var(--pastdue);}

/* ── BOTTOM SHEET ── */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;opacity:0;transition:opacity .25s;}
.sheet-backdrop.open{display:block;}
.sheet-backdrop.visible{opacity:1;}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:101;
  background:var(--surface);border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  padding:0 0 calc(var(--safe-bot) + 16px);
  max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0);
}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 0;}
.sheet-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);}
.sheet-title{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px;}
.sheet-id{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);}
.sheet-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--pill-r);font-size:11px;font-weight:600;margin-top:8px;}
.sheet-body{padding:16px 20px;}
.sheet-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);}
.sheet-row:last-child{border-bottom:none;}
.sheet-lbl{font-size:12px;color:var(--text2);flex-shrink:0;width:42%;}
.sheet-val{font-size:13px;font-weight:500;text-align:right;word-break:break-word;}
.sheet-notes{margin-top:12px;background:var(--surface2);border-radius:10px;padding:12px 14px;}
.sheet-notes-lbl{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.sheet-note-item{font-size:12px;color:var(--text2);line-height:1.5;padding:4px 0;border-bottom:1px solid var(--border);}
.sheet-note-item:last-child{border-bottom:none;}
.note-by{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:2px;}

/* ── EMPTY / LOADING ── */
.empty-state{text-align:center;padding:48px 24px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.empty-sub{font-size:12px;}
.loading-wrap{text-align:center;padding:48px 24px;}
.loading-ring{width:32px;height:32px;border:3px solid var(--border);border-top-color:#1f6feb;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:calc(var(--safe-bot) + 80px);left:50%;transform:translateX(-50%) translateY(20px);
  background:#1f6feb;color:#fff;padding:10px 18px;border-radius:var(--pill-r);
  font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-badge">LTR</div>
  <div class="login-title">Lopez Tech Repairs</div>
  <div class="login-sub">Enter your PIN to continue</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button class="num-btn" onclick="numTap('1')">1</button>
    <button class="num-btn" onclick="numTap('2')">2</button>
    <button class="num-btn" onclick="numTap('3')">3</button>
    <button class="num-btn" onclick="numTap('4')">4</button>
    <button class="num-btn" onclick="numTap('5')">5</button>
    <button class="num-btn" onclick="numTap('6')">6</button>
    <button class="num-btn" onclick="numTap('7')">7</button>
    <button class="num-btn" onclick="numTap('8')">8</button>
    <button class="num-btn" onclick="numTap('9')">9</button>
    <button class="num-btn empty"></button>
    <button class="num-btn" onclick="numTap('0')">0</button>
    <button class="num-btn del" onclick="numDel()">⌫</button>
  </div>
  <div id="login-err">Incorrect PIN. Try again.</div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">LTR</div>
    <div style="flex:1;">
      <div class="tb-title">Repairs</div>
      <div class="tb-sub" id="tb-sub">—</div>
    </div>
    <button class="tb-refresh" onclick="loadRepairs()">
      <span id="refresh-spin">↻</span> Refresh
    </button>
  </div>

  <div class="filter-bar">
    <div class="f-chip active" data-loc="both" onclick="setLoc('both')">All</div>
    <div class="f-chip" data-loc="Dayton" onclick="setLoc('Dayton')">Dayton</div>
    <div class="f-chip" data-loc="Crosby" onclick="setLoc('Crosby')">Crosby</div>
    <div class="f-sep"></div>
    <div class="f-chip active" data-status="active" onclick="setStatusFilter('active')">Active</div>
    <div class="f-chip" data-status="Ready for Pickup" onclick="setStatusFilter('Ready for Pickup')">Ready</div>
    <div class="f-chip" data-status="In Progress" onclick="setStatusFilter('In Progress')">In Progress</div>
    <div class="f-chip" data-status="Awaiting Parts" onclick="setStatusFilter('Awaiting Parts')">Waiting</div>
    <div class="f-chip" data-status="Intake & Acceptance" onclick="setStatusFilter('Intake & Acceptance')">Intake</div>
    <div class="f-chip" data-status="Completed" onclick="setStatusFilter('Completed')">Done</div>
  </div>

  <div class="search-wrap">
    <input class="search-inp" id="search" placeholder="Search customer, repair, ID…" oninput="render()"/>
  </div>

  <div class="scroll-area" id="scroll-area">
    <div class="loading-wrap"><div class="loading-ring"></div></div>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div class="sheet-backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div class="sheet-title" id="sh-name">—</div>
    <div class="sheet-id" id="sh-id">—</div>
    <div class="sheet-status" id="sh-status"></div>
  </div>
  <div class="sheet-body" id="sh-body"></div>
</div>

<div id="toast"></div>

<script>
var FB = 'https://lopez-tech-repairs-82c87-default-rtdb.firebaseio.com';
var KEY = 'vy7bsIpXGsJtyTO175pQiDJ8lgYbdLWJG4R9SZLm';
var PINS = {'7679':true,'7910':true,'0329':true};

var repairs = [];
var locFilter = 'both';
var statusFilter = 'active';
var pinBuf = '';
var _toast;

// ── LOGIN ──
function numTap(n){
  if(pinBuf.length>=4) return;
  pinBuf+=n;
  document.getElementById('d'+(pinBuf.length-1)).classList.add('filled');
  if(pinBuf.length===4) setTimeout(tryLogin,120);
}
function numDel(){
  if(!pinBuf.length) return;
  document.getElementById('d'+(pinBuf.length-1)).classList.remove('filled');
  pinBuf=pinBuf.slice(0,-1);
}
function tryLogin(){
  if(PINS[pinBuf]){
    document.getElementById('login').style.opacity='0';
    document.getElementById('login').style.transition='opacity .3s';
    setTimeout(function(){
      document.getElementById('login').style.display='none';
      document.getElementById('app').classList.add('on');
      loadRepairs();
    },300);
  } else {
    document.getElementById('login-err').style.display='block';
    [0,1,2,3].forEach(function(i){document.getElementById('d'+i).classList.remove('filled');});
    pinBuf='';
    setTimeout(function(){document.getElementById('login-err').style.display='none';},1800);
  }
}

// ── DATA ──
async function loadRepairs(){
  var spin=document.getElementById('refresh-spin');
  spin.classList.add('spinning');
  try {
    var res = await fetch(FB+'/lopeztechrepairs/repairs.json?auth='+KEY);
    var data = await res.json();
    if(data){
      var arr = Array.isArray(data)?data:Object.values(data);
      repairs = arr.filter(Boolean);
    }
    render();
    updateSub();
    showToast('Updated');
  } catch(e){
    showToast('Failed to load');
  }
  spin.classList.remove('spinning');
}

function updateSub(){
  var active = repairs.filter(function(r){return r.Status!=='Completed';});
  document.getElementById('tb-sub').textContent = active.length+' active · '+repairs.length+' total';
}

// ── FILTERS ──
function setLoc(v){
  locFilter=v;
  document.querySelectorAll('.f-chip[data-loc]').forEach(function(c){c.classList.toggle('active',c.dataset.loc===v);});
  render();
}
function setStatusFilter(v){
  statusFilter=v;
  document.querySelectorAll('.f-chip[data-status]').forEach(function(c){c.classList.toggle('active',c.dataset.status===v);});
  render();
}

// ── STATUS CONFIG ──
var STATUS_CFG = {
  'Intake & Acceptance':  {color:'#6e7681', bg:'rgba(110,118,129,.15)'},
  'In Progress':          {color:'#f85149', bg:'rgba(248,81,73,.15)'},
  'Dispatched to Specialist':{color:'#a371f7', bg:'rgba(163,113,247,.15)'},
  'Awaiting Parts':       {color:'#e3b341', bg:'rgba(227,179,65,.15)'},
  'Ready for Pickup':     {color:'#3fb950', bg:'rgba(63,185,80,.15)'},
  'Past Due':             {color:'#f85149', bg:'rgba(248,81,73,.15)'},
  'Completed':            {color:'#58a6ff', bg:'rgba(88,166,255,.15)'},
};
var STATUS_ORDER = ['Ready for Pickup','In Progress','Awaiting Parts','Dispatched to Specialist','Intake & Acceptance','Past Due','Completed'];

// ── RENDER ──
function render(){
  var q=(document.getElementById('search').value||'').toLowerCase().trim();
  var list = repairs.filter(function(r){
    if(locFilter!=='both' && r.Location!==locFilter) return false;
    if(statusFilter==='active') { if(r.Status==='Completed') return false; }
    else if(r.Status!==statusFilter) return false;
    if(q){
      var hay=(r.CustomerName+' '+r.RepairName+' '+r.Device+' '+r.ID+' '+(r.Phone1||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  if(!list.length){
    document.getElementById('scroll-area').innerHTML =
      '<div class="empty-state"><div class="empty-icon">📋</div>'
      +'<div class="empty-title">No repairs found</div>'
      +'<div class="empty-sub">Try a different filter or search</div></div>';
    return;
  }

  // Group by status
  var groups = {};
  list.forEach(function(r){
    var s=r.Status||'Intake & Acceptance';
    if(!groups[s]) groups[s]=[];
    groups[s].push(r);
  });

  var html='';
  STATUS_ORDER.forEach(function(s){
    if(!groups[s]) return;
    var cfg=STATUS_CFG[s]||{color:'#8b949e',bg:'rgba(139,148,158,.15)'};
    var grp=groups[s].slice().sort(function(a,b){
      // Ready for Pickup: oldest first (waiting longest)
      // Others: newest first
      var da=new Date(a.DropoffDate||a.CreatedAt||0);
      var db=new Date(b.DropoffDate||b.CreatedAt||0);
      return s==='Ready for Pickup'?da-db:db-da;
    });
    html+='<div class="status-group">'
      +'<div class="status-hdr">'
        +'<div class="status-dot" style="background:'+cfg.color+'"></div>'
        +'<div class="status-name">'+s+'</div>'
        +'<div class="status-cnt">'+grp.length+'</div>'
      +'</div>';
    grp.forEach(function(r){html+=renderCard(r);});
    html+='</div>';
  });
  document.getElementById('scroll-area').innerHTML=html;
}

function renderCard(r){
  var cfg=STATUS_CFG[r.Status]||{color:'#8b949e'};
  var locClass=r.Location==='Dayton'?'tag-loc-D':'tag-loc-C';
  var quote=parseFloat(r.Quote||0);
  var dropDate=fmtDate(r.DropoffDate||r.CreatedAt);
  return '<div class="card" data-status="'+esc(r.Status||'')+'" onclick=\'openSheet('+JSON.stringify(r.ID)+')\''
    +'style="border-left-color:'+cfg.color+'">'
    +'<div class="card-top">'
      +'<div class="card-body">'
        +'<div class="card-name">'+esc(r.RepairName||r.Device||'—')+'</div>'
        +'<div class="card-customer">'+esc(r.CustomerName||'—')+(r.Phone1?' · '+fmtPhone(r.Phone1):'')+'</div>'
        +'<div class="card-tags">'
          +'<span class="tag '+locClass+'">'+esc(r.Location||'—')+'</span>'
          +(r.AssignedTo?'<span class="tag tag-tech">'+esc(r.AssignedTo)+'</span>':'')
          +'<span class="tag tag-id">'+esc(r.ID||'')+'</span>'
        +'</div>'
      +'</div>'
      +'<div class="card-right">'
        +'<div class="card-quote" style="color:'+cfg.color+'">$'+quote.toFixed(2)+'</div>'
        +'<div class="card-date">'+dropDate+'</div>'
      +'</div>'
    +'</div>'
  +'</div>';
}

// ── BOTTOM SHEET ──
function openSheet(id){
  var r=repairs.find(function(x){return x.ID===id;});
  if(!r) return;
  var cfg=STATUS_CFG[r.Status]||{color:'#8b949e',bg:'rgba(139,148,158,.15)'};
  document.getElementById('sh-name').textContent=r.RepairName||r.Device||'—';
  document.getElementById('sh-id').textContent=r.ID;
  document.getElementById('sh-status').textContent=r.Status||'—';
  document.getElementById('sh-status').style.background=cfg.bg;
  document.getElementById('sh-status').style.color=cfg.color;

  var rows=[
    ['Customer',   r.CustomerName||'—'],
    ['Phone',      r.Phone1?fmtPhone(r.Phone1):'—'],
    ['Location',   r.Location||'—'],
    ['Technician', r.AssignedTo||'—'],
    ['Drop-off',   fmtDate(r.DropoffDate)],
    ['Quote',      '$'+parseFloat(r.Quote||0).toFixed(2)],
    ['Category',   r.Category||'—'],
    ['Quality',    r.Quality||'—'],
    ['IMEI',       r.IMEI||'—'],
    ['Passcode',   r.Passcode||'—'],
  ].filter(function(row){return row[1]&&row[1]!=='—';});

  var html=rows.map(function(row){
    return '<div class="sheet-row"><div class="sheet-lbl">'+row[0]+'</div><div class="sheet-val">'+esc(row[1])+'</div></div>';
  }).join('');

  // Notes
  var notes=r.NotesArr||[];
  if(typeof r.Notes==='string'&&r.Notes.trim()&&!notes.length) notes=[{text:r.Notes,by:'',ts:''}];
  if(notes.length){
    html+='<div class="sheet-notes">'
      +'<div class="sheet-notes-lbl">Notes ('+notes.length+')</div>'
      +notes.slice().reverse().map(function(n){
        return '<div class="sheet-note-item">'
          +(n.by?'<div class="note-by">'+esc(n.by)+(n.ts?' · '+fmtDateTime(n.ts):'')+'</div>':'')
          +'<div>'+esc(n.text||'')+'</div>'
        +'</div>';
      }).join('')
    +'</div>';
  }

  document.getElementById('sh-body').innerHTML=html;

  var bd=document.getElementById('backdrop');
  var sh=document.getElementById('sheet');
  bd.style.display='block';
  sh.classList.add('open');
  setTimeout(function(){bd.classList.add('visible');},10);
}

function closeSheet(){
  var bd=document.getElementById('backdrop');
  var sh=document.getElementById('sheet');
  bd.classList.remove('visible');
  sh.classList.remove('open');
  setTimeout(function(){bd.style.display='none';},280);
}

// ── UTILS ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtPhone(p){var r=(p+'').replace(/\D/g,'');return r.length===10?'('+r.slice(0,3)+') '+r.slice(3,6)+'-'+r.slice(6):p;}
function fmtDate(d){if(!d)return'—';try{var dt=new Date(d);if(isNaN(dt))return d;return(dt.getMonth()+1)+'/'+(dt.getDate())+'/'+dt.getFullYear();}catch(e){return d;}}
function fmtDateTime(d){if(!d)return'';try{var dt=new Date(d);return(dt.getMonth()+1)+'/'+(dt.getDate())+' '+dt.getHours()%12||12+':'+(dt.getMinutes()+'').padStart(2,'0')+(dt.getHours()<12?' AM':' PM');}catch(e){return'';}}
function showToast(msg){
  clearTimeout(_toast);
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  _toast=setTimeout(function(){t.classList.remove('show');},2000);
}

// Keyboard shortcut to dismiss sheet
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSheet();});
</script>

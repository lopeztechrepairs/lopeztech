<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>LTR · Repairs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2129;--surface3:#21262d;
  --border:#30363d;--border2:#3d444d;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --intake:#6e7681;--inprog:#f85149;--spec:#a371f7;
  --awaiting:#e3b341;--ready:#3fb950;--pastdue:#f85149;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;overflow:hidden;}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:999;}
.login-badge{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#1f6feb,#0d419d);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;margin-bottom:20px;box-shadow:0 8px 32px rgba(31,111,235,.4);}
.login-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px;}
.pin-dots{display:flex;gap:12px;margin-bottom:32px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all .2s;}
.pin-dot.filled{background:#1f6feb;border-color:#1f6feb;transform:scale(1.1);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px;}
.num-btn{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:18px;font-size:22px;font-weight:500;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-user-select:none;transition:transform .1s;}
.num-btn:active{background:var(--surface3);transform:scale(.95);}
.num-btn.del{font-size:18px;color:var(--text2);}
.num-btn.empty{visibility:hidden;}
#login-err{margin-top:16px;font-size:12px;color:var(--inprog);display:none;}

/* APP */
#app{display:none;height:100%;flex-direction:column;}
#app.on{display:flex;}

/* TOPBAR */
.topbar{padding:calc(var(--safe-top) + 14px) 16px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.tb-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1f6feb,#0d419d);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.tb-title{font-size:16px;font-weight:700;letter-spacing:-.4px;flex:1;}
.tb-sub{font-size:10px;color:var(--text2);}
.tb-refresh{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;}
.tb-refresh:active{opacity:.7;}
#refresh-spin{display:inline-block;}
#refresh-spin.spinning{animation:spin .5s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* FILTER BAR */
.filter-bar{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.f-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:'DM Sans',sans-serif;}
.f-chip[data-loc="both"].active{background:rgba(31,111,235,.15);color:#58a6ff;border-color:#1f6feb;font-weight:600;}
.f-chip[data-loc="Dayton"].active{background:rgba(35,134,54,.15);color:#3fb950;border-color:#238636;font-weight:600;}
.f-chip[data-loc="Crosby"].active{background:rgba(31,111,235,.15);color:#79c0ff;border-color:#1f6feb;font-weight:600;}
.f-sep{width:1px;background:var(--border);flex-shrink:0;margin:2px 0;}
.f-chip.pd-pill{border-color:rgba(248,81,73,.4);color:#f85149;}
.f-chip.pd-pill.active{background:rgba(248,81,73,.15);color:#f85149;border-color:#f85149;font-weight:600;}

/* SEARCH */
.search-wrap{padding:10px 16px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);}
.search-inp{width:100%;padding:9px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.search-inp::placeholder{color:var(--text3);}
.search-inp:focus{border-color:var(--border2);}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px calc(var(--safe-bot) + 16px);}
.scroll-area::-webkit-scrollbar{display:none;}

/* STATUS GROUP — collapsible */
.sg{margin-bottom:10px;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.sg-hdr{
  display:flex;align-items:center;gap:10px;padding:13px 14px;
  cursor:pointer;background:var(--surface);user-select:none;
  transition:background .15s;
}
.sg-hdr:active{background:var(--surface2);}
.sg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sg-name{font-size:12px;font-weight:700;letter-spacing:.3px;flex:1;}
.sg-cnt{font-size:11px;font-weight:600;color:var(--text3);font-family:'DM Mono',monospace;background:var(--surface3);padding:2px 8px;border-radius:10px;}
.sg-arrow{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.sg-arrow.open{transform:rotate(180deg);}
.sg-body{display:none;border-top:1px solid var(--border);}
.sg-body.open{display:block;}

/* PAST DUE — always expanded, red border */
.sg.past-due{border-color:rgba(248,81,73,.4);}
.sg.past-due .sg-hdr{background:rgba(248,81,73,.08);}

/* REPAIR CARD */
.card{padding:13px 14px;border-bottom:1px solid var(--border);background:var(--surface);position:relative;}
.card:last-child{border-bottom:none;}
.card-row1{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;}
.card-left{flex:1;min-width:0;}
.card-repair{font-size:13px;font-weight:600;letter-spacing:-.1px;color:#79c0ff;cursor:pointer;display:inline;word-break:break-word;}
.card-repair:active{opacity:.7;}
.card-customer-btn{font-size:12px;color:var(--text2);cursor:pointer;margin-top:2px;display:inline-block;}
.card-customer-btn:active{opacity:.7;}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.card-quote{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;}
.card-date{font-size:10px;color:var(--text3);}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap;}
.tag-loc-D{background:rgba(35,134,54,.15);color:#3fb950;}
.tag-loc-C{background:rgba(31,111,235,.15);color:#79c0ff;}
.tag-tech{background:var(--surface3);color:var(--text2);}
.tag-id{color:var(--text3);font-family:'DM Mono',monospace;font-size:9px;}
.tag-pd{background:rgba(248,81,73,.15);color:#f85149;}

/* MINI POPUP (customer / repair detail) */
.popup-bd{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.popup-bd.open{display:flex;}
.popup{
  background:var(--surface);border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);width:100%;
  padding:0 0 calc(var(--safe-bot)+16px);
  max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,0,.67,0);
}
.popup.open{transform:translateY(0);}
.popup-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 0;}
.popup-head{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.popup-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.popup-htitle{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.popup-hsub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
.popup-body{padding:14px 18px;}
.prow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);}
.prow:last-child{border-bottom:none;}
.plbl{font-size:12px;color:var(--text2);width:40%;flex-shrink:0;}
.pval{font-size:13px;font-weight:500;text-align:right;word-break:break-word;color:var(--text);}
.pval.mono{font-family:'DM Mono',monospace;font-size:12px;}
.pval.green{color:#3fb950;}
.pval.blue{color:#79c0ff;}
.popup-section{margin-top:14px;}
.popup-section-lbl{font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.note-card{background:var(--surface2);border-radius:10px;padding:10px 13px;margin-bottom:6px;}
.note-meta{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:4px;}
.note-text{font-size:12px;color:var(--text2);line-height:1.5;}
.popup-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px;}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:40px 24px;color:var(--text3);}
.empty-icon{font-size:32px;margin-bottom:10px;}
.empty-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.loading-ring{width:28px;height:28px;border:3px solid var(--border);border-top-color:#1f6feb;border-radius:50%;animation:spin .7s linear infinite;margin:40px auto 12px;}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--safe-bot)+72px);left:50%;transform:translateX(-50%) translateY(12px);background:#238636;color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-badge">LTR</div>
  <div class="login-title">Lopez Tech Repairs</div>
  <div class="login-sub">Enter your PIN to continue</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button class="num-btn" onclick="numTap('1')">1</button>
    <button class="num-btn" onclick="numTap('2')">2</button>
    <button class="num-btn" onclick="numTap('3')">3</button>
    <button class="num-btn" onclick="numTap('4')">4</button>
    <button class="num-btn" onclick="numTap('5')">5</button>
    <button class="num-btn" onclick="numTap('6')">6</button>
    <button class="num-btn" onclick="numTap('7')">7</button>
    <button class="num-btn" onclick="numTap('8')">8</button>
    <button class="num-btn" onclick="numTap('9')">9</button>
    <button class="num-btn empty"></button>
    <button class="num-btn" onclick="numTap('0')">0</button>
    <button class="num-btn del" onclick="numDel()">⌫</button>
  </div>
  <div id="login-err">Incorrect PIN. Try again.</div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">LTR</div>
    <div style="flex:1;">
      <div class="tb-title">Repairs</div>
      <div class="tb-sub" id="tb-sub">—</div>
    </div>
    <button class="tb-refresh" onclick="loadRepairs()">
      <span id="refresh-spin">↻</span> Refresh
    </button>
  </div>
  <div class="filter-bar">
    <div class="f-chip active" data-loc="both" onclick="setLoc('both')">All</div>
    <div class="f-chip" data-loc="Dayton" onclick="setLoc('Dayton')">Dayton</div>
    <div class="f-chip" data-loc="Crosby" onclick="setLoc('Crosby')">Crosby</div>
    <div class="f-sep"></div>
    <div class="f-chip pd-pill" id="pd-pill" onclick="togglePastDue()">🚨 Past Due <span id="pd-badge" style="display:none;background:#f85149;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:2px;"></span></div>
  </div>
  <div class="search-wrap">
    <input class="search-inp" id="search" placeholder="Search customer, repair, ID…" oninput="render()"/>
  </div>
  <div class="scroll-area" id="scroll-area">
    <div class="loading-ring"></div>
  </div>
</div>

<!-- CUSTOMER POPUP -->
<div class="popup-bd" id="cust-bd" onclick="closePopup('cust-bd','cust-pop')">
  <div class="popup" id="cust-pop" onclick="event.stopPropagation()">
    <div class="popup-handle"></div>
    <div class="popup-head">
      <div class="popup-icon" style="background:rgba(35,134,54,.15);">👤</div>
      <div>
        <div class="popup-htitle" id="cp-name">—</div>
        <div class="popup-hsub" id="cp-id">—</div>
      </div>
    </div>
    <div class="popup-body" id="cp-body"></div>
  </div>
</div>

<!-- REPAIR DETAIL POPUP -->
<div class="popup-bd" id="rep-bd" onclick="closePopup('rep-bd','rep-pop')">
  <div class="popup" id="rep-pop" onclick="event.stopPropagation()">
    <div class="popup-handle"></div>
    <div class="popup-head">
      <div class="popup-icon" style="background:rgba(31,111,235,.15);">🔧</div>
      <div>
        <div class="popup-htitle" id="rp-name">—</div>
        <div class="popup-hsub" id="rp-id">—</div>
        <div id="rp-status" class="popup-status"></div>
      </div>
    </div>
    <div class="popup-body" id="rp-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
var FB  = 'https://lopez-tech-repairs-82c87-default-rtdb.firebaseio.com';
var KEY = 'vy7bsIpXGsJtyTO175pQiDJ8lgYbdLWJG4R9SZLm';
var PINS = {'7679':true,'7910':true,'0329':true};
var repairs = [];
var locFilter = 'both';
var showPastDue = false;
var pinBuf = '';
var _toast;

// ordered top→bottom: Past Due pinned first, then workflow order
var STATUS_ORDER = [
  'Past Due',
  'Intake & Acceptance',
  'In Progress',
  'Dispatched to Specialist',
  'Awaiting Parts',
  'Ready for Pickup',
];

var STATUS_CFG = {
  'Past Due':                  {color:'#f85149', bg:'rgba(248,81,73,.15)',  emoji:'🚨'},
  'Intake & Acceptance':       {color:'#6e7681', bg:'rgba(110,118,129,.15)',emoji:'📋'},
  'In Progress':               {color:'#f85149', bg:'rgba(248,81,73,.15)',  emoji:'🔧'},
  'Dispatched to Specialist':  {color:'#a371f7', bg:'rgba(163,113,247,.15)',emoji:'✈️'},
  'Awaiting Parts':            {color:'#e3b341', bg:'rgba(227,179,65,.15)', emoji:'📦'},
  'Ready for Pickup':          {color:'#3fb950', bg:'rgba(63,185,80,.15)',  emoji:'✅'},
  'Completed':                 {color:'#58a6ff', bg:'rgba(88,166,255,.15)', emoji:'💰'},
};

// Which groups start collapsed (all except Past Due which is always expanded)
var collapsed = {
  'Intake & Acceptance': true,
  'In Progress': true,
  'Dispatched to Specialist': true,
  'Awaiting Parts': true,
  'Ready for Pickup': true,
};

// ── LOGIN ──
function numTap(n){
  if(pinBuf.length>=4) return;
  pinBuf+=n;
  document.getElementById('d'+(pinBuf.length-1)).classList.add('filled');
  if(pinBuf.length===4) setTimeout(tryLogin,120);
}
function numDel(){
  if(!pinBuf.length) return;
  document.getElementById('d'+(pinBuf.length-1)).classList.remove('filled');
  pinBuf=pinBuf.slice(0,-1);
}
function tryLogin(){
  if(PINS[pinBuf]){
    var l=document.getElementById('login');
    l.style.transition='opacity .3s'; l.style.opacity='0';
    setTimeout(function(){
      l.style.display='none';
      document.getElementById('app').classList.add('on');
      loadRepairs();
    },300);
  } else {
    document.getElementById('login-err').style.display='block';
    [0,1,2,3].forEach(function(i){document.getElementById('d'+i).classList.remove('filled');});
    pinBuf='';
    setTimeout(function(){document.getElementById('login-err').style.display='none';},1800);
  }
}

// ── DATA ──
async function loadRepairs(){
  var spin=document.getElementById('refresh-spin');
  spin.classList.add('spinning');
  try{
    var res=await fetch(FB+'/lopeztechrepairs/repairs.json?auth='+KEY);
    var data=await res.json();
    if(data){
      var arr=Array.isArray(data)?data:Object.values(data);
      repairs=arr.filter(Boolean);
    }
    render(); updateSub(); updatePDPill(); showToast('Updated ✓');
  } catch(e){ showToast('Failed to load'); }
  spin.classList.remove('spinning');
}

function updateSub(){
  var active=repairs.filter(function(r){return r.Status!=='Completed';}).length;
  document.getElementById('tb-sub').textContent=active+' active · '+repairs.length+' total';
}

// ── LOCATION FILTER ──
function setLoc(v){
  locFilter=v;
  document.querySelectorAll('.f-chip[data-loc]').forEach(function(c){
    c.classList.toggle('active',c.dataset.loc===v);
  });
  render();
  updatePDPill();
}

// ── PAST DUE PILL ──
function togglePastDue(){
  showPastDue=!showPastDue;
  var pill=document.getElementById('pd-pill');
  if(pill) pill.classList.toggle('active',showPastDue);
  render();
}

function updatePDPill(){
  var count=repairs.filter(function(r){
    return r.Status==='Past Due'&&(locFilter==='both'||r.Location===locFilter);
  }).length;
  var badge=document.getElementById('pd-badge');
  var pill=document.getElementById('pd-pill');
  if(badge){
    badge.style.display=count>0?'inline':'none';
    badge.textContent=count;
  }
  if(pill) pill.style.display=count>0?'inline-flex':'none';
}

// ── TOGGLE COLLAPSE ──
function toggleGroup(status){
  if(status==='Past Due') return;
  collapsed[status]=!collapsed[status];
  render();
}

// ── RENDER ──
function render(){
  var q=(document.getElementById('search').value||'').toLowerCase().trim();

  updatePDPill();
  var list=repairs.filter(function(r){
    if(r.Status==='Completed') return false;
    // Past Due only shown when pill is active
    if(r.Status==='Past Due' && !showPastDue) return false;
    if(locFilter!=='both' && r.Location!==locFilter) return false;
    if(q){
      var hay=(r.CustomerName+' '+r.RepairName+' '+r.Device+' '+r.ID+' '+(r.Phone1||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  if(!list.length){
    document.getElementById('scroll-area').innerHTML=
      '<div class="empty-state"><div class="empty-icon">📋</div>'
      +'<div class="empty-title">No active repairs</div>'
      +'<div class="empty-sub">Try a different location or search</div></div>';
    return;
  }

  var groups={};
  list.forEach(function(r){
    var s=r.Status||'Intake & Acceptance';
    if(!groups[s]) groups[s]=[];
    groups[s].push(r);
  });

  var html='';
  STATUS_ORDER.forEach(function(s){
    if(!groups[s]||!groups[s].length) return;
    var cfg=STATUS_CFG[s]||{color:'#8b949e',bg:'rgba(139,148,158,.15)',emoji:'•'};
    var isPD=s==='Past Due';
    var isOpen=!collapsed[s];
    var grp=groups[s].slice().sort(function(a,b){
      var da=new Date(a.DropoffDate||a.CreatedAt||0);
      var db=new Date(b.DropoffDate||b.CreatedAt||0);
      return s==='Ready for Pickup'?da-db:db-da;
    });

    html+='<div class="sg'+(isPD?' past-due':'')+'">'
      +'<div class="sg-hdr" onclick="toggleGroup(\''+s.replace(/'/g,"\\'")+'\')">'
        +'<div class="sg-dot" style="background:'+cfg.color+'"></div>'
        +'<div class="sg-name" style="color:'+cfg.color+'">'+cfg.emoji+' '+esc(s)+'</div>'
        +'<div class="sg-cnt">'+grp.length+'</div>'
        +'<div class="sg-arrow'+(isOpen?' open':'')+'">▼</div>'
      +'</div>'
      +'<div class="sg-body'+(isOpen?' open':'')+'">'
        +grp.map(function(r){return renderCard(r,cfg);}).join('')
      +'</div>'
    +'</div>';
  });

  document.getElementById('scroll-area').innerHTML=html||
    '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No repairs found</div></div>';
}

function renderCard(r,cfg){
  var locClass=r.Location==='Dayton'?'tag-loc-D':'tag-loc-C';
  var quote=parseFloat(r.Quote||0);
  var dropDate=fmtDate(r.DropoffDate||r.CreatedAt);
  var id=esc(r.ID||'');

  return '<div class="card">'
    +'<div class="card-row1">'
      +'<div class="card-left">'
        // Repair name — tappable
        +'<div class="card-repair" onclick=\'event.stopPropagation();openRepairDetail('+JSON.stringify(r.ID)+')\'>'+esc(r.RepairName||r.Device||'—')+'</div>'
        // Customer — tappable
        +'<div class="card-customer-btn" onclick=\'event.stopPropagation();openCustomer('+JSON.stringify(r.ID)+')\'>'
          +'👤 '+esc(r.CustomerName||'—')
        +'</div>'
      +'</div>'
      +'<div class="card-right">'
        +'<div class="card-quote" style="color:'+cfg.color+'">$'+quote.toFixed(2)+'</div>'
        +'<div class="card-date">'+dropDate+'</div>'
      +'</div>'
    +'</div>'
    +'<div class="card-tags">'
      +'<span class="tag '+locClass+'">'+esc(r.Location||'—')+'</span>'
      +(r.AssignedTo?'<span class="tag tag-tech">'+esc(r.AssignedTo)+'</span>':'')
      +'<span class="tag tag-id">'+id+'</span>'
    +'</div>'
  +'</div>';
}

// ── CUSTOMER POPUP ──
function openCustomer(id){
  var r=repairs.find(function(x){return x.ID===id;});
  if(!r) return;
  document.getElementById('cp-name').textContent=r.CustomerName||'—';
  document.getElementById('cp-id').textContent=r.ID;

  var rows=[
    ['Phone',       r.Phone1?fmtPhone(r.Phone1):'—'],
    ['Phone 2',     r.Phone2?fmtPhone(r.Phone2):'—'],
    ['Location',    r.Location||'—'],
    ['Notes',       r.CustomerNotes||'—'],
  ].filter(function(rw){return rw[1]&&rw[1]!=='—';});

  var html=rows.map(function(row){
    return '<div class="prow"><div class="plbl">'+row[0]+'</div><div class="pval">'+esc(row[1])+'</div></div>';
  }).join('');

  // Activity involving this customer
  var acts=(r.ActivityLog||[]).filter(function(a){return a&&a.text;}).slice(-5).reverse();
  if(acts.length){
    html+='<div class="popup-section"><div class="popup-section-lbl">Recent activity</div>'
      +acts.map(function(a){
        return '<div class="note-card"><div class="note-meta">'
          +esc(a.by||'')+(a.ts?' · '+fmtDateTime(a.ts):'')
          +'</div><div class="note-text">'+esc(a.text||'')+'</div></div>';
      }).join('')
    +'</div>';
  }

  document.getElementById('cp-body').innerHTML=html;
  openPopup('cust-bd','cust-pop');
}

// ── REPAIR DETAIL POPUP ──
function openRepairDetail(id){
  var r=repairs.find(function(x){return x.ID===id;});
  if(!r) return;
  var cfg=STATUS_CFG[r.Status]||{color:'#8b949e',bg:'rgba(139,148,158,.15)',emoji:'•'};
  document.getElementById('rp-name').textContent=r.RepairName||r.Device||'—';
  document.getElementById('rp-id').textContent=r.ID;
  var st=document.getElementById('rp-status');
  st.textContent=(cfg.emoji||'')+' '+r.Status;
  st.style.background=cfg.bg; st.style.color=cfg.color;

  var rows=[
    ['Customer',    r.CustomerName||'—'],
    ['Location',    r.Location||'—'],
    ['Technician',  r.AssignedTo||'—'],
    ['Drop-off',    fmtDate(r.DropoffDate)],
    ['Quote',       '$'+parseFloat(r.Quote||0).toFixed(2),'green'],
    ['Category',    r.Category||'—'],
    ['Quality',     r.Quality||'—'],
    ['IMEI',        r.IMEI||'—','mono'],
    ['Passcode',    r.Passcode||'—','mono'],
  ].filter(function(rw){return rw[1]&&rw[1]!=='—';});

  var html=rows.map(function(row){
    var cls=row[2]?(' '+row[2]):'';
    return '<div class="prow"><div class="plbl">'+row[0]+'</div><div class="pval'+cls+'">'+esc(row[1])+'</div></div>';
  }).join('');

  // Notes
  var notes=[];
  if(r.NotesArr&&r.NotesArr.length) notes=r.NotesArr;
  else if(typeof r.Notes==='string'&&r.Notes.trim()) notes=[{text:r.Notes,by:'',ts:''}];
  if(notes.length){
    html+='<div class="popup-section"><div class="popup-section-lbl">Notes</div>'
      +notes.slice().reverse().map(function(n){
        return '<div class="note-card"><div class="note-meta">'+esc(n.by||'Tech')+(n.ts?' · '+fmtDateTime(n.ts):'')+'</div>'
          +'<div class="note-text">'+esc(n.text||'')+'</div></div>';
      }).join('')
    +'</div>';
  }

  // Activity log
  var acts=(r.ActivityLog||[]).filter(function(a){return a&&a.text;}).slice(-8).reverse();
  if(acts.length){
    html+='<div class="popup-section"><div class="popup-section-lbl">Activity</div>'
      +acts.map(function(a){
        return '<div class="note-card"><div class="note-meta">'+esc(a.by||'')+(a.ts?' · '+fmtDateTime(a.ts):'')+'</div>'
          +'<div class="note-text">'+esc(a.text||'')+'</div></div>';
      }).join('')
    +'</div>';
  }

  document.getElementById('rp-body').innerHTML=html;
  openPopup('rep-bd','rep-pop');
}

// ── POPUP HELPERS ──
function openPopup(bdId,popId){
  var bd=document.getElementById(bdId);
  var pop=document.getElementById(popId);
  bd.classList.add('open');
  setTimeout(function(){pop.classList.add('open');},10);
}
function closePopup(bdId,popId){
  var bd=document.getElementById(bdId);
  var pop=document.getElementById(popId);
  pop.classList.remove('open');
  setTimeout(function(){bd.classList.remove('open');},300);
}

// ── UTILS ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtPhone(p){var r=(p+'').replace(/\D/g,'');return r.length===10?'('+r.slice(0,3)+') '+r.slice(3,6)+'-'+r.slice(6):p;}
function fmtDate(d){if(!d)return'—';try{var dt=new Date(d);if(isNaN(dt.getTime()))return d;return(dt.getMonth()+1)+'/'+(dt.getDate())+'/'+dt.getFullYear();}catch(e){return d;}}
function fmtDateTime(d){if(!d)return'';try{var dt=new Date(d);var h=dt.getHours()%12||12;var m=(dt.getMinutes()+'').padStart(2,'0');var ap=dt.getHours()<12?'AM':'PM';return(dt.getMonth()+1)+'/'+(dt.getDate())+' '+h+':'+m+' '+ap;}catch(e){return'';}}
function showToast(msg){clearTimeout(_toast);var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');_toast=setTimeout(function(){t.classList.remove('show');},2000);}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    closePopup('rep-bd','rep-pop');
    closePopup('cust-bd','cust-pop');
  }
});
</script>
</body>
</html>
